<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#050505"/>
  <!-- Skull shape -->
  <circle cx="50" cy="38" r="28" fill="white"/>
  <rect x="28" y="52" width="44" height="22" rx="4" fill="white"/>
  <!-- Eyes -->
  <circle cx="40" cy="38" r="8" fill="#050505"/>
  <circle cx="60" cy="38" r="8" fill="#050505"/>
  <!-- Nose -->
  <path d="M47 50 L50 44 L53 50 Z" fill="#050505"/>
  <!-- Teeth gap -->
  <rect x="38" y="58" width="8" height="10" rx="2" fill="#050505"/>
  <rect x="54" y="58" width="8" height="10" rx="2" fill="#050505"/>
  <!-- DM letters below (optional highlight) -->
  <rect x="0" y="88" width="100" height="12" fill="#FFD600"/>
  <text x="50" y="98" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="10" fill="#050505">DAREMATES</text>
</svg>
